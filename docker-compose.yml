version: '3'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: postgres-db
    ports:
      - "5432-5432"
    volumes:
      - postgres-data: /var/lib/postgresql/data
      - ./sql/init.sql: /docker-entryendpoint-initdb.d/init.sql
  airflow:
    image: apache/airflow:2.9.0
    container_name: airflow
    restart: always
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW_CORE_LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
    command: >
      bash -c "airflow db init && airflow users create --username admin --password admin --email admin@example.com --role Admin --firstname admin --lastname admin && airflow webserver & airflow scheduler"
  etl:
    build: .
    container_name: etl-pipeline
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: postgres-db
    volumes:
      - ./app:/app/data
    depends-on:
      postgres
volumes:
  postgres-data:
