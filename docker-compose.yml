version: '3'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: postgres-db
    ports:
      - "5432-5432"
    volumes:
      - postgres-data: /var/lib/postgresql/data
      - ./sql/init.sql: /docker-entryendpoint-initdb.d/init.sql
  etl:
    build: .
    container_name: etl-pipeline
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: postgres-db
    volumes:
      - ./app:/app/data
    depends-on:
      postgres
volumes:
  postgres-data:
